<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Wallpaper — Cozy Concierge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">Cozy Concierge</div>
    <a href="index.html" class="back">← Back</a>
</nav>

<section class="activate">
    <div class="ticket">
        <div class="stub">
            <span>FREE</span>
            <span>✦</span>
        </div>
        <div class="main">
            <div class="eyebrow">FREE PHONE WALLPAPER</div>
            <h1>Tell us your favorite coffee spot.</h1>
            <p>Enter your favorite coffee place to unlock a free Cozy Concierge phone wallpaper.</p>
            <p class="hint">Hint: get them all!!</p>
            
            <form id="wallpaper-form">
                <input type="text" name="coffee" placeholder="Favorite coffee place" required>
                <button type="submit">Get Wallpaper</button>
            </form>
            
            <div id="download-area" style="display:none;">
                <a id="download-link" href="images/wallpaper/wallpaper_01.jpg" class="download-btn" download>Download Wallpaper</a>
            </div>
            
            <p class="fine-print"></p>
        </div>
    </div>
</section>

<footer>
    <a href="about.html">About</a>
    <span>Cozy Concierge</span>
    <span>2026</span>
</footer>

<script>
document.getElementById('wallpaper-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = this;
    var coffee = form.querySelector('input[name="coffee"]').value;
    // Randomize wallpaper
    var wallpapers = [
        'wallpaper_01.jpg',
        'wallpaper_02.jpg',
        'wallpaper_03.jpg'
    ];
    var randomWallpaper = wallpapers[Math.floor(Math.random() * wallpapers.length)];
    var downloadLink = document.getElementById('download-link');
    downloadLink.href = 'images/wallpaper/' + randomWallpaper;
    form.style.display = 'none';
    document.getElementById('download-area').style.display = 'block';
});
</script>

</body>
</html>
