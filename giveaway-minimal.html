<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Wallpaper — Cozy Concierge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">Cozy Concierge</div>
    <a href="index.html" class="back">← Back</a>
</nav>

<section class="activate">
    <div class="ticket">
        <div class="stub">
            <span>FREE</span>
            <span>✦</span>
        </div>
        <div class="main">
            <div class="eyebrow">FREE PHONE WALLPAPER</div>
            <h1>Post your zipcode to download.</h1>
            <p>Enter your zipcode to unlock a free Cozy Concierge phone wallpaper.</p>
            
            <form id="wallpaper-form">
                <input type="text" name="zipcode" placeholder="Zipcode" pattern="[0-9]{5}" required>
                <button type="submit">Get Wallpaper</button>
            </form>
            
            <div id="download-area" style="display:none;">
                <a href="wallpaper.jpg" class="download-btn" download>Download Wallpaper</a>
            </div>
            
            <p class="fine-print">One download per zipcode. No spam.</p>
        </div>
    </div>
</section>

<footer>
    <a href="about.html">About</a>
    <span>Cozy Concierge</span>
    <span>2026</span>
</footer>

<script>
document.getElementById('wallpaper-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = this;
    var zipcode = form.querySelector('input[name="zipcode"]').value;
    // TODO: Send zipcode to backend for tracking
    // For now: show download
    form.style.display = 'none';
    document.getElementById('download-area').style.display = 'block';
});
</script>

</body>
</html>
