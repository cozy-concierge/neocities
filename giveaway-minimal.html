<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Perk — Cozy Concierge</title>
    <link rel="stylesheet" href="style-minimal.css">
</head>
<body>

<nav>
    <div class="logo">Cozy Concierge</div>
    <a href="index-minimal.html" class="back">← Back</a>
</nav>

<section class="activate">
    <div class="ticket">
        <div class="stub">
            <span>PERK</span>
            <span>✦</span>
        </div>
        <div class="main">
            <div class="eyebrow">LIMITED ACTIVATION</div>
            <h1>You get something too.</h1>
            <p>Enter your zipcode to unlock a special perk at our next event. One entry per person.</p>
            
            <div class="perk-box">
                <span class="perk-label">YOUR PERK</span>
                <span class="perk-value">Free print with any purchase</span>
            </div>
            
            <form>
                <input type="text" placeholder="Zipcode" pattern="[0-9]{5}" required>
                <button type="submit">Claim Perk</button>
            </form>
            
            <p class="fine-print">Perk valid at next Cozy Concierge event. While supplies last.</p>
        </div>
    </div>
</section>

<footer>
    <a href="about-minimal.html">About</a>
    <span>Cozy Concierge</span>
    <span>2026</span>
</footer>

</body>
</html>
