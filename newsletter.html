<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: 8.5in 14in; margin: 0.3in; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    @media screen {
      html, body { 
        overflow: auto;
        width: 8.5in;
        margin: 0 auto;
      }
    }
    
    .page {
      height: 13.4in;
      max-height: 13.4in;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .page-header {
      border: 3px solid #F0566E;
      border-radius: 8px;
      height: 0.9in;
      max-height: 0.9in;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      background-size: cover;
      background-position: center;
    }
    .page-header-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
    }
    .page-header-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0.08in 0.1in 0.08in 0.4in;
      color: black;
    }
    .page-header-content h1 { font-size: 1.6em; margin: 0; }
    .page-header-content h2 { font-size: 1.2em; margin: 0; }
    .page-header-content p { font-size: 0.85em; margin: 0.05em 0 0; font-weight: bold; }
    
    .page-content {
      display: flex;
      flex: 1;
      gap: 0.2in;
      padding-top: 0.2in;
      overflow: hidden;
    }
    
    .ad-column {
      width: 2.25in;
      display: flex;
      flex-direction: column;
      gap: 0.12in;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .ad-separator {
      width: 100%;
      max-height: 0.75in;
      overflow: hidden;
    }
    .ad-separator img {
      width: 100%;
      height: auto;
      max-height: 0.75in;
      object-fit: contain;
    }
    
    .main-content {
      flex: 1;
      border-left: 1px solid #ccc;
      border-right: 1px solid #ccc;
      padding: 0.12in;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .content-block {
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.1in;
      margin-bottom: 0.1in;
      font-size: 11pt;
      line-height: 1.4;
    }
    .content-block:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    .content-block h1 { font-size: 1.4em; margin-bottom: 0.1in; }
    .content-block h2 { font-size: 1.2em; margin-bottom: 0.08in; }
    .content-block p { margin-bottom: 0.08in; }
    .content-separator {
      min-height: 0.4in;
      max-height: 2in;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.15in;
    }
    .content-separator img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .ad-section {
      border: 3px solid #F0566E;
      border-radius: 8px;
      overflow: hidden;
      height: 2.6in;
      flex-shrink: 0;
      background: white;
    }
    .ad-section-inner {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      overflow: hidden;
    }
    .ad-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .ad-style-1 {
      border: 4px solid #F0566E;
      box-shadow: 6px 6px 0 #F0566E, inset 0 0 0 6px white;
    }
    .ad-style-2 {
      border: 5px double #F0566E;
    }
    .ad-style-3 {
      border: 5px dashed white;
      box-shadow: 0 0 0 4px #F0566E;
    }
    .ad-style-4 {
      border: 4px solid #F0566E;
      box-shadow: inset 0 0 0 8px white, inset 0 0 0 12px #F0566E;
    }
    .ad-style-5 {
      border: 4px solid #F0566E;
      box-shadow: inset 0 0 0 10px white, 8px 8px 0 #F0566E;
    }
    
    .page2 {
      height: 13.4in;
      max-height: 13.4in;
      display: flex;
      flex-direction: column;
      gap: 0.2in;
      overflow: hidden;
    }
    .page2-header {
      border: 3px solid #F0566E;
      border-radius: 8px;
      padding: 0.15in;
      height: 1in;
      max-height: 1in;
      overflow: hidden;
      flex-shrink: 0;
    }
    .page2-image-area {
      flex: 1;
      border: 3px dashed #F0566E;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    .page2-image-area img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center top;
    }
    .page2-footer {
      border: 3px solid #F0566E;
      border-radius: 8px;
      padding: 0.15in;
      height: 1.5in;
      max-height: 1.5in;
      overflow: hidden;
      flex-shrink: 0;
    }
    .page-footer {
      border-top: 3px solid #F0566E;
      padding: 0.1in;
      margin-top: 0.15in;
      max-height: 1.5in;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sponsor-cta {
      margin-bottom: 0.15in;
      padding-bottom: 0.15in;
      border-bottom: 1px solid #ccc;
    }
    .ad-credits {
      font-size: 0.7em;
      color: #666;
      line-height: 1.4;
    }
    .ad-credits-inline {
      display: inline;
    }
    .ad-credits-inline::after {
      content: " | ";
    }
    .ad-credits-inline:last-child::after {
      content: "";
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <img class="page-header-bg" src="">
      <div class="page-header-content"></div>
    </div>
    <div class="page-content">
      <div class="ad-column"></div>
      <div class="main-content"><div class='content-block'></div></div>
      <div class="ad-column"></div>
    </div>
    <div class="page-footer">
      <div class="sponsor-cta"></div>
      <div class="ad-credits"></div>
    </div>
  </div>
  
  <div class="page2">
    <div class="page2-header"><h2>Offtrack Vol. 3</h2></div>
    <div class="page2-image-area"><img src="../images/page2/OF3-2.jpeg"></div>
    <div class="page2-footer"></div>
  </div>
</body>
</html>
