<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concierge Services — Cozy Concierge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">Cozy Concierge</div>
    <a href="index.html" class="back">← Back</a>
</nav>

<section class="dogsitting">
    <div class="ticket">
        <div class="stub">
            <span>SERVICE</span>
            <span>✦</span>
        </div>
        <div class="main">
            <div class="eyebrow">CONCIERGE</div>
            <h1>Need a hand with something?</h1>
            <p>From pet sitting to errands, I'm here to help make your life a little easier.</p>
            
            <form action="https://formspree.io/f/xrerakvy" method="POST">
                <select name="service-type" required>
                    <option value="">What do you need?</option>
                    <option>Pet Sitting</option>
                    <option>Errands / Shopping</option>
                    <option>House Sitting</option>
                    <option>Other</option>
                </select>
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="text" name="dates" placeholder="Dates / Details" onfocus="this.type='date'" onblur="this.type='text'">
                <textarea name="message" placeholder="Tell me more..." rows="3"></textarea>
                <button type="submit">Request Service</button>
            </form>
        </div>
    </div>
</section>

<footer>
    <a href="about.html">About</a>
    <span>Cozy Concierge</span>
    <span>2026</span>
</footer>

</body>
</html>
