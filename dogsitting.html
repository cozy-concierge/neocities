<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogsitting — Cozy Concierge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">Cozy Concierge</div>
    <a href="index.html" class="back">← Back</a>
</nav>

<section class="dogsitting">
    <div class="ticket">
        <div class="stub">
            <span>PET</span>
            <span>✦</span>
        </div>
        <div class="main">
            <div class="eyebrow">DOGSITTING</div>
            <h1>Need a sitter?</h1>
            <p>I'm available to watch your pup while you're out of town. Local Dallas pickups.</p>
            
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="text" placeholder="Dog's Name & Breed">
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Dates needed" onfocus="this.type='date'" onblur="this.type='text'">
                <textarea placeholder="Anything I should know?" rows="3"></textarea>
                <button type="submit">Request Sitter</button>
            </form>
        </div>
    </div>
</section>

<footer>
    <a href="about.html">About</a>
    <span>Cozy Concierge</span>
    <span>2026</span>
</footer>

</body>
</html>
